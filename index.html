<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Lead</title>
    <!-- 1. Load Office.js -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <!-- 2. Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Using Inter font as a base */
        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 antialiased">
    <div class="p-4 md:p-6">
        <h3 class="text-xl font-semibold text-gray-900 mb-4">Send to Lead Manager</h3>

        <!-- Form for lead options -->
        <div class="space-y-4">
            <div>
                <label for="leadOption" class="block text-sm font-medium text-gray-700 mb-1">Lead Type</label>
                <select id="leadOption" name="leadOption" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm rounded-md shadow-sm">
                    <option value="New Inquiry">New Inquiry</option>
                    <option value="Existing Client Upsell">Existing Client Upsell</option>
                    <option value="Partner Referral">Partner Referral</option>
                    <option value="Cold Outreach">Cold Outreach</option>
                </select>
            </div>

            <button id="sendBtn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-150">
                Send Lead
            </button>
        </div>

        <!-- Status message area -->
        <div id="status" class="mt-4 text-sm text-center"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const WEBHOOK_URL = "https://hooks.zapier.com/hooks/catch/25482238/uzen7zq/";
        // ---------------------

        /**
         * Office.onReady is called when the Office JavaScript framework is ready.
         */
        Office.onReady(function(info) {
            if (info.host === Office.HostType.Outlook) {
                // Add click listener to the send button
                document.getElementById("sendBtn").onclick = sendLead;
            }
        });

        /**
         * Main function to gather data and send it to the webhook.
         */
        async function sendLead() {
            const statusEl = document.getElementById("status");
            const sendBtn = document.getElementById("sendBtn");
            
            statusEl.textContent = "Sending...";
            statusEl.className = "mt-4 text-sm text-center text-gray-600";
            sendBtn.disabled = true;
            sendBtn.classList.add("opacity-50", "cursor-not-allowed");

            try {
                // Get a reference to the current email item
                const item = Office.context.mailbox.item;
                // Get a reference to the logged-in user's profile
                const userProfile = Office.context.mailbox.userProfile;

                // --- 1. Get Lead Info (from the email sender) ---
                // 'from' or 'sender' can be used. 'from' is usually what you want.
                const from = item.from || item.sender;
                const leadEmail = from.emailAddress || "";
                const leadName = from.displayName || "";

                // --- 2. Get Submitter Info (the logged-in user) ---
                const submittedByEmail = userProfile.emailAddress;
                const submittedByName = userProfile.displayName;

                // --- 3. Get Dropdown Value ---
                const option = document.getElementById("leadOption").value;

                // --- 4. Get Other Email Details ---
                const subject = item.subject || "";
                // internetMessageId is a great unique ID for an email
                const internetMessageId = item.internetMessageId || "";

                // --- 5. Build the JSON payload ---
                const payload = {
                    leadEmail,
                    leadName,
                    subject,
                    submittedByEmail,
                    submittedByName,
                    option,
                    internetMessageId,
                    receivedTime: item.dateTimeCreated.toISOString()
                };

                // --- 6. Send the data to the webhook ---
                const response = await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        // You could add an auth token here if your webhook needs one
                        // "Authorization": "Bearer YOUR_SECRET_TOKEN"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server responded with ${response.status}: ${errorText}`);
                }

                const result = await response.json();

                // Show success
                statusEl.textContent = "Lead sent successfully! ✅";
                statusEl.className = "mt-4 text-sm text-center text-green-600 font-medium";

                // Optional: Close the task pane on success after a short delay
                setTimeout(() => {
                    Office.context.ui.closeContainer();
                }, 1500);

            } catch (err) {
                console.error(err);
                // Show error
                statusEl.textContent = "Error: " + err.message;
                statusEl.className = "mt-4 text-sm text-center text-red-600 font-medium";
            } finally {
                // Re-enable the button
                sendBtn.disabled = false;
                sendBtn.classList.remove("opacity-50", "cursor-not-allowed");
            }
        }
    </script>
</body>
</html>
